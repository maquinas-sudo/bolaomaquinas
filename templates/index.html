<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena | Bolão</title>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: sans-serif; margin: 0; padding: 0; }
        header { background: #1e1e1e; padding: 20px; border-bottom: 2px solid #ffcc00; display: flex; justify-content: space-between; align-items: center; }
        .container { padding: 20px; max-width: 800px; margin: auto; }
        .match-card { background: #1e1e1e; border-left: 5px solid #ffcc00; padding: 15px; margin-bottom: 15px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
        .match-card:hover { background: #2a2a2a; }
        .odds { font-size: 1.4em; font-weight: bold; color: #ffcc00; }
        .btn-link { background: #007bff; color: white; padding: 8px 15px; text-decoration: none; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <h2>Arena Bolão</h2>
        <a href="/apostas_publicas" class="btn-link">VER APOSTAS</a>
    </header>
    <div class="container">
        <h3>Jogos Disponíveis</h3>
        {% for jogo in jogos %}
        <div class="match-card" onclick="window.location.href='/apostas_publicas'">
            <div>
                <div style="font-size: 1.1em; font-weight: bold;">{{ jogo.time_a }} vs {{ jogo.time_b }}</div>
                <small style="color: #888;">{{ jogo.status }}</small>
            </div>
            <div class="odds">{{ jogo.placar }}</div>
        </div>
        {% endfor %}
    </div>
</body>
</html>
