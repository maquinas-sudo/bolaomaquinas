<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Arena | Bolão Máquinas</title>
    <style>
        body { background-color: #1a1a1a; color: #ccc; font-family: sans-serif; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .hodometro { background: #333; padding: 10px 15px; border-radius: 5px; border: 1px solid #ffcc00; font-weight: bold; color: #ffcc00; }
        .btn-publico { background: #007bff; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; font-weight: bold; }
        .jogo-row { background: #2a2a2a; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-radius: 4px; cursor: pointer; border: 1px solid #333; }
        .placar-box { font-size: 1.5em; color: #fff; font-weight: bold; background: #111; padding: 5px 15px; border-radius: 5px; margin-left: 15px; }
        .trofeu-rei { color: #00ff00; font-size: 0.8em; margin-top: 5px; background: rgba(0,255,0,0.1); display: inline-block; padding: 3px 8px; border-radius: 3px; border: 1px solid #00ff00; }
    </style>
</head>
<body>
<div class="header">
    <h2>⚽ Arena | Jogador: {{ usuario }}</h2>
    <div class="hodometro">Suas Apostas: R$ {{ gasto }}</div>
    <a href="{{ url_for('apostas_publicas') }}" class="btn-publico">ACOMPANHE AS APOSTAS</a>
</div>
{% for jogo in jogos %}
<div class="jogo-row" onclick="window.location.href='/apostas_publicas'">
    <div>
        <div style="font-size: 1.2em;"><b>{{ jogo.time_a }}</b> vs <b>{{ jogo.time_b }}</b></div>
        <div class="{% if jogo.status == 'AO VIVO' %}status-ao-vivo{% endif %}">{{ jogo.status }}</div>
        {% if jogo.vencedores_placar %}<div class="trofeu-rei">🏆 Vencedores: {{ jogo.vencedores_placar|join(', ') }}</div>{% endif %}
    </div>
    <div class="placar-box">{{ jogo.placar }}</div>
</div>
{% endfor %}
</body>
</html>
