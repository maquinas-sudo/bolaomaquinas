<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Apostas Públicas</title>
    <style>
        body { background-color: #1a1a1a; color: #ccc; font-family: sans-serif; padding: 20px; }
        .btn-filtro { background: #333; color: white; border: none; padding: 10px; margin: 5px; border-radius: 5px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; background: #222; }
        th, td { padding: 12px; border: 1px solid #333; text-align: center; }
    </style>
</head>
<body>
<h2>📊 Painel de Apostas</h2>
<a href="/">⬅ Voltar</a>
<div id="filtros"></div>
<table id="tabela-apostas">
    <thead><tr><th>Usuário</th><th>Jogo</th><th>Gols</th><th>Estatísticas</th></tr></thead>
    <tbody>
        {% for p in palpites %}
        <tr class="linha-aposta" data-id="{{ p.jogo_id }}">
            <td>{{ p.usuario }}</td>
            <td>Jogo #{{ p.jogo_id }}</td>
            <td>{{ p.gols_a }} x {{ p.gols_b }}</td>
            <td>E:{{ p.escanteios }} A:{{ p.amarelos }} V:{{ p.vermelhos }} S:{{ p.subs }} Ac:{{ p.acrescimo }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
</body>
</html>
