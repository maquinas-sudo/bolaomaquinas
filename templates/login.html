<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso | Bolão Máquinas</title>
    <style>
        body { 
            background-color: #1a1a1a; color: #fff; font-family: sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; 
        }
        .login-card { 
            background: #222; padding: 40px; border-radius: 10px; 
            border: 1px solid #333; width: 100%; max-width: 350px; text-align: center;
        }
        h2 { color: #ffcc00; margin-bottom: 25px; }
        input { 
            width: 100%; padding: 12px; margin-bottom: 15px; background: #333; 
            border: 1px solid #444; border-radius: 5px; color: white; box-sizing: border-box;
        }
        button { 
            width: 100%; padding: 12px; background: #ffcc00; border: none; 
            border-radius: 5px; font-weight: bold; cursor: pointer; color: #000;
        }
        button:hover { background: #e6b800; }
        .erro { color: #ff4444; font-size: 0.9em; margin-top: 10px; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>🔐 Acesso Arena</h2>
    <form method="POST">
        <input type="text" name="usuario" placeholder="Seu Nome" required>
        <input type="password" name="senha" placeholder="Senha" required>
        <button type="submit">ENTRAR</button>
    </form>
    {% if erro %}
        <p class="erro">❌ {{ erro }}</p>
    {% endif %}
</div>

</body>
</html>
